<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FXトレード管理パネル</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2f3e54">

<!-- iOS: ホーム画面に追加した時にアドレスバーなしで開くための指定 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FXパネル">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/favicon-32.png" sizes="32x32">

<style>
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; overflow:hidden; background:#f4f5f7;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif; }

  .app { display:flex; flex-direction:column; height:100%; }

  .view-container { flex:1 1 auto; position:relative; overflow:hidden; }
  .view-frame { position:absolute; inset:0; width:100%; height:100%; border:none; display:none; }
  .view-frame.active { display:block; }

  .bottom-nav {
    flex:0 0 auto; display:flex; background:#ffffff; border-top:1px solid #e5e7eb;
    padding-bottom:env(safe-area-inset-bottom, 0);
  }
  .nav-btn {
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:2px; padding:10px 4px 8px 4px; background:none; border:none; cursor:pointer;
    color:#6b7280; font-size:11px; font-family:inherit;
  }
  .nav-btn .icon { font-size:22px; line-height:1; }
  .nav-btn.active { color:#2f3e54; font-weight:600; }

  .fab {
    position:absolute; right:16px; bottom:16px; z-index:10;
    display:flex; align-items:center; gap:8px;
    background:#e88fb0; color:#fff; border:none; border-radius:999px;
    padding:12px 18px; font-size:14px; font-weight:600; font-family:inherit;
    box-shadow:0 4px 14px rgba(0,0,0,0.22); cursor:pointer;
  }
  .fab .icon { font-size:18px; }
</style>
</head>
<body>

  <div class="app">
    <div class="view-container">
      <iframe class="view-frame active" id="frame-risk" src="risk_panel.html" title="リスク管理パネル"></iframe>
      <iframe class="view-frame" id="frame-analysis" src="analysis_panel.html" title="パフォーマンス分析ダッシュボード"></iframe>
      <iframe class="view-frame" id="frame-character" src="character_panel.html" title="相棒"></iframe>
      <button class="fab" id="recordFab">
        <span class="icon">📝</span>
        <span>記録する</span>
      </button>
    </div>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-target="frame-risk">
        <span class="icon">🎯</span>
        <span>リスク管理</span>
      </button>
      <button class="nav-btn" data-target="frame-analysis">
        <span class="icon">📊</span>
        <span>分析</span>
      </button>
      <button class="nav-btn" data-target="frame-character">
        <span class="icon">🐱</span>
        <span>相棒</span>
      </button>
    </nav>
  </div>

<script>
  // 既存インストール向けの補完：formUrl項目の追加前からプロジェクトを使っていた場合、
  // Fundoraのフォームだけ自動で埋める（他のプロジェクトのデータには触れない）
  (function backfillFundoraFormUrl() {
    const FUNDORA_FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSefmLDGLfYRskTeB6rA_piFhgitZMQMWjlvVVWqObdLI3G_-Q/viewform?usp=header';
    let projects = [];
    try { projects = JSON.parse(localStorage.getItem('tradingProjects') || '[]'); } catch (e) { return; }
    let changed = false;
    projects.forEach(p => {
      if (p.name === 'Fundora マスタープラン' && !p.formUrl) {
        p.formUrl = FUNDORA_FORM_URL;
        changed = true;
      }
    });
    if (changed) localStorage.setItem('tradingProjects', JSON.stringify(projects));
  })();

  function selectTab(targetId) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.view-frame').forEach(f => f.classList.remove('active'));
    const btn = document.querySelector(`.nav-btn[data-target="${targetId}"]`);
    const frame = document.getElementById(targetId);
    if (btn) btn.classList.add('active');
    if (frame) frame.classList.add('active');
  }

  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => selectTab(btn.dataset.target));
  });

  // URLの#でタブを直接指定して開けるようにする（例：フォーム送信後の確認メッセージから #character で相棒タブへ）
  const HASH_TAB_MAP = { character: 'frame-character', risk: 'frame-risk', analysis: 'frame-analysis' };
  function applyHashTab() {
    const key = (location.hash || '').replace('#', '');
    const targetId = HASH_TAB_MAP[key];
    if (targetId) selectTab(targetId);
  }
  applyHashTab();
  window.addEventListener('hashchange', applyHashTab);

  // フリック操作でのタブ移動：各iframe内で検知したスワイプをpostMessageで受け取る
  const TAB_ORDER = ['frame-risk', 'frame-analysis', 'frame-character'];
  function currentActiveFrameId() {
    const active = document.querySelector('.view-frame.active');
    return active ? active.id : TAB_ORDER[0];
  }
  function goToAdjacentTab(direction) {
    const idx = TAB_ORDER.indexOf(currentActiveFrameId());
    if (idx === -1) return;
    const nextIdx = direction === 'left' ? idx + 1 : idx - 1;
    if (nextIdx < 0 || nextIdx >= TAB_ORDER.length) return; // 端では折り返さない
    selectTab(TAB_ORDER[nextIdx]);
  }
  window.addEventListener('message', (e) => {
    if (e.origin !== window.location.origin) return;
    const data = e.data;
    if (data && data.source === 'fxpanel' && data.type === 'swipe') {
      goToAdjacentTab(data.direction);
    }
  });

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }

  // 「記録する」ボタン：今アクティブなプロジェクトのフォームURLを新しいタブで開く
  document.getElementById('recordFab').addEventListener('click', () => {
    let projects = [];
    try { projects = JSON.parse(localStorage.getItem('tradingProjects') || '[]'); } catch (e) {}
    const activeId = localStorage.getItem('tradingActiveProjectId') || '';
    const active = projects.find(p => p.id === activeId);
    if (active && active.formUrl) {
      window.open(active.formUrl, '_blank');
    } else if (active) {
      alert(`「${active.name}」には記録フォームのURLがまだ登録されていません。\nプロジェクト管理画面から追加してください。`);
    } else {
      alert('プロジェクトが選択されていません。リスク管理タブでプロジェクトを選んでください。');
    }
  });
</script>
</body>
</html>
